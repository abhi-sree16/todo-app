# todo-app
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do App</title>

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 20px;
      width: 350px;
      border-radius: 10px;
    }

    h2 {
      text-align: center;
    }

    input {
      width: 70%;
      padding: 8px;
    }

    button {
      padding: 8px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #eee;
      margin-top: 8px;
      padding: 8px;
      display: flex;
      justify-content: space-between;
    }

    .delete {
      background: red;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>To-Do App</h2>

    <input type="text" id="task" placeholder="Enter task">
    <button onclick="addTask()">Add</button>

    <ul id="list"></ul>
  </div>

  <script>
    function addTask() {
      let taskInput = document.getElementById("task");
      let task = taskInput.value;

      if (task === "") {
        alert("Enter a task");
        return;
      }

      let li = document.createElement("li");
      li.innerHTML = task + ' <button class="delete" onclick="removeTask(this)">X</button>';

      document.getElementById("list").appendChild(li);

      taskInput.value = "";
    }

    function removeTask(btn) {
      btn.parentElement.remove();
    }
  </script>

</body>
</html>
